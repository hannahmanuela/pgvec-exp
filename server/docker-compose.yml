services:
  pgvec:
    image: pgvector/pgvector:pg17-bookworm
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: benchdb
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - pgvec_data:/var/lib/postgresql/data
    shm_size: 1g
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=64MB
    cpuset: "4,6,8,10"

  bg:
    build:
      context: ../bg
    profiles: ["std"]
    ports:
      - "3001:3001"
    privileged: true
    cpu_shares: 2
    cpuset: "4,6,8,10"

volumes:
  pgvec_data:
